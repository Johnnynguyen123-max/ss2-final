<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin sách - DDC Books</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1971c2; --bg: #f8f9fa; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px 20px; margin: 0; }
        .form-container { max-width: 850px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .full-width { grid-column: span 2; }
        
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #4a5568; margin-bottom: 8px; letter-spacing: 0.5px; }
        input, select, textarea { 
            width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 10px; 
            font-size: 1rem; box-sizing: border-box; transition: 0.2s; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn { padding: 12px 25px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #155d9e; transform: translateY(-1px); }
        .btn-back { background: #f1f3f5; color: #495057; }
        
        .current-img { margin-top: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #666; }
        .current-img img { width: 50px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header-area">
            <h1 style="margin:0; font-size: 1.5rem;">
                <i class="fas fa-book-open" style="color: var(--primary);"></i> 
                {% if book %}Cập nhật: {{ book.title }}{% else %}Thêm sách mới{% endif %}
            </h1>
            <a href="{% url 'staff_book_list' %}" class="btn btn-back"><i class="fas fa-arrow-left"></i> Quay lại</a>
        </div>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="grid-layout">
                
                <div class="form-group full-width">
                    <label>Tiêu đề sách</label>
                    <input type="text" name="title" value="{{ book.title|default:'' }}" placeholder="Nhập tên sách..." required>
                </div>

                <div class="form-group">
                    <label>Tác giả</label>
                    <input type="text" name="author" value="{{ book.author|default:'' }}" placeholder="Tên tác giả" required>
                </div>

                <div class="form-group">
                    <label>Thể loại</label>
                    <select name="category">
                        <option value="">-- Chọn thể loại --</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if book.category.id == cat.id %}selected{% endif %}>
                                {{ cat.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Giá bán (VNĐ)</label>
                    <input type="number" name="price" value="{{ book.price|default:'' }}" placeholder="Ví dụ: 150000" required>
                </div>

                <div class="form-group">
                    <label>Số lượng tồn kho</label>
                    <input type="number" name="stock" value="{{ book.stock|default:0 }}" min="0" required>
                </div>

                <div class="form-group full-width">
                    <label>Mô tả nội dung</label>
                    <textarea name="description" rows="5" placeholder="Viết tóm tắt nội dung sách...">{{ book.description|default:'' }}</textarea>
                </div>

                <div class="form-group full-width">
                    <label>Ảnh bìa sách</label>
                    <input type="file" name="image" accept="image/*">
                    {% if book.image %}
                    <div class="current-img">
                        <span>Ảnh hiện tại:</span>
                        <img src="{{ book.image.url }}" alt="cover">
                    </div>
                    {% endif %}
                </div>
            </div>

            <div style="margin-top: 40px; display: flex; gap: 15px; justify-content: flex-end;">
                <button type="submit" class="btn btn-save">
                    <i class="fas fa-save"></i> LƯU THÔNG TIN
                </button>
                {% if not book %}
                <button type="submit" name="_addanother" class="btn btn-back" style="background: #e7f5ff; color: #1971c2;">
                    LƯU & THÊM TIẾP
                </button>
                {% endif %}
            </div>
        </form>
    </div>

</body>
</html>
