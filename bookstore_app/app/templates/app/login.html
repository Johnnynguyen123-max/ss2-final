{% extends 'app/base.html' %}
{% load static %}

{% block title %}Đăng nhập - DDC Books{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="{% static 'app/images/logo.png' %}" alt="DDC Books Logo" style="max-width: 200px;">
        </div>
        <h2 class="auth-title">Đăng nhập</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Tên đăng nhập" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="auth-submit">ĐĂNG NHẬP</button>
            <div class="auth-links">
                <a href="#">Quên mật khẩu?</a>
                <p>Chưa có tài khoản? <a href="{% url 'signup' %}" style="color: #E98A61; font-weight: bold;">Đăng ký ngay</a></p>
            </div>
        </form>
    </div>
</section>
{% endblock %}
